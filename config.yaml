# ML4SCI QMLHEP Task V - Configuration File
# 
# This configuration file contains all hyperparameters for training.
# Usage: python train.py --config config.yaml

# Data Configuration
data_dir: ./data
k_neighbors: 8
max_particles: 30
train_ratio: 0.8
force_regenerate: false

# Model Configuration
model: particlenet  # Options: particlenet, particlenet_lite, simple_gnn, gat
hidden_dim: 64
conv_channels: [64, 128, 256]
fc_channels: [256, 128]
num_layers: 3
heads: 4
dropout: 0.1

# Training Configuration
epochs: 50
batch_size: 32
lr: 0.001
weight_decay: 0.0001
scheduler: cosine  # Options: cosine, plateau, onecycle, none
lr_patience: 5
early_stopping: 15

# System Configuration
device: auto  # Options: auto, cuda, cpu
num_workers: 0
seed: 42

# Output Configuration
output_dir: ./outputs
experiment_name: null
save_best_only: false
